# ============================================================
# Config: LLM Calibration & Alignment Experiments
# Authors: Shahab Ahmad, Inam Ul Hassan, Ejaz Ulhaq
# ============================================================

model:
  base_model: "huggyllama/llama-7b"
  tokenizer: "huggyllama/llama-7b"
  load_in_8bit: false
  dtype: "float16"

lora:
  r: 8
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  dataset: "databricks/databricks-dolly-15k"   # options: dolly | alpaca | openassistant
  num_epochs: 3
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2               # effective batch = 16 * 2 * num_gpus = 128
  max_seq_length: 2048
  learning_rate: 3.0e-4
  warmup_steps: 100
  lr_scheduler_type: "linear"
  fp16: true
  gradient_checkpointing: true
  save_strategy: "epoch"
  logging_steps: 50
  output_dir: "./checkpoints"
  seed: 42

evaluation:
  clm:
    dataset: "EleutherAI/pile"
    split: "test"
    num_samples: 5000
  facts:
    dataset: "hadyelsahar/t-rex"
    split: "train"
    num_samples: 5000
  mmlu:
    dataset: "cais/mmlu"
    split: "test"
    num_samples: 3000
    num_shots: 5

ece:
  num_bins: 10
  bin_strategy: "equal_width"

system_prompt: "You are a helpful assistant."
